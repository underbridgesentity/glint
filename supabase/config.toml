# Glint — Supabase local/dev config.
# Production project should be created in the nearest EU region to South Africa
# (eu-west-2 London / eu-west-1 Ireland / eu-central-1 Frankfurt).
project_id = "glint"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
# Glint signs customers in by phone (SA mobile numbers) + WhatsApp OTP.
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = true

[realtime]
enabled = true
